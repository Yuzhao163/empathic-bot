# Railway 生产环境 docker-compose（参考）
version: '3.8'
services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - GATEWAY_LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]

  python_service:
    build: ./python_service
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}

  java_service:
    build: ./java_service
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/actuator/health"]

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_GATEWAY_URL=${GATEWAY_URL:-http://localhost:8080}
