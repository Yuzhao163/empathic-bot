[railway]
id = "empathic-bot"
region = "us-east"

# Gateway 服务（编译后的 Go 二进制）
[[services]]
name = "gateway"
path = "gateway"
startCommand = "./gateway"
healthCheckPath = "/health"
environmentVariables = {
  REDIS_URL = "",
  GATEWAY_LOG_LEVEL = "info",
  PORT = "8080"
}

# Python LLM Service
[[services]]
name = "python_service"
path = "python_service"
startCommand = "python main.py"
environmentVariables = {
  MINIMAX_API_KEY = "",
  MINIMAX_BASE_URL = "https://api.minimaxi.com/v1",
  LLM_MODEL = "MiniMax-M2.7",
  LLM_TEMPERATURE = "0.8",
  LLM_MAX_TOKENS = "1000",
  MAX_CONTEXT_TOKENS = "6000"
}
