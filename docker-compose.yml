services:
  redis:
    image: redis:7-alpine
    container_name: empathic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  gateway:
    build: ./gateway
    container_name: empathic-gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=8080
      - GATEWAY_LOG_LEVEL=info
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
      python_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  python_service:
    build: ./python_service
    container_name: empathic-python
    ports:
      - "8001:8001"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimaxi.com/v1}
      - LLM_MODEL=${LLM_MODEL:-MiniMax-M2.7}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.8}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: empathic-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_GATEWAY_URL=http://gateway:8080
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
