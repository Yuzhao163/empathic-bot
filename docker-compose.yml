services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  gateway:
    build: ./gateway
    container_name: empathic-gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=8080
      - GATEWAY_LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
      python_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  python_service:
    build: ./python_service
    container_name: empathic-python
    ports:
      - "8001:8001"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimaxi.com/anthropic}
      - LLM_MODEL=${LLM_MODEL:-MiniMax-Text-01}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  java_service:
    build: ./java_service
    container_name: empathic-java
    ports:
      - "8002:8002"
    environment:
      - SERVER_PORT=8002
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: empathic-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_GATEWAY_URL=http://localhost:8080
    depends_on:
      gateway:
        condition: service_healthy
