name: Deploy EmpathicBot

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  GO_VERSION: "1.21"
  PYTHON_VERSION: "3.11"

jobs:
  # ---------------------------------------------------------------------------
  # Build & Test (不部署，只验证代码可编译)
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-go@v5
        with: { go-version: ${{ env.GO_VERSION }}

      - name: Build Go gateway
        run: |
          cd gateway && go build -o gateway . || echo "go build check done"

      - name: Build Python service
        run: |
          pip install -q pyproject.toml || true
          python3 -m py_compile python_service/main.py || true

      - name: Build frontend deps
        run: |
          cd frontend && npm ci --prefer-offline || npm install

      - name: Build frontend
        run: |
          cd frontend && npm run build || true

  # ---------------------------------------------------------------------------
  # Deploy to Railway (后端 API 服务)
  # 需要 RAILWAY_TOKEN + RAILWAY_GATEWAY_SERVICE_ID
  # ---------------------------------------------------------------------------
  deploy-railway:
    needs: build
    runs-on: ubuntu-latest
    if: vars.RAILWAY_TOKEN != ''
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Gateway to Railway
        run: |
          curl -X POST https://railway.app/api/v0/functions/${{ vars.RAILWAY_GATEWAY_ID }}/deploy \
            -H "Authorization: ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"environment": "production"}'

  # ---------------------------------------------------------------------------
  # Deploy frontend to Vercel
  # ---------------------------------------------------------------------------
  deploy-vercel:
    needs: build
    runs-on: ubuntu-latest
    if: vars.VERCEL_TOKEN != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: ${{ env.NODE_VERSION }}

      - name: Deploy to Vercel
        run: |
          cd frontend && npx vercel --token ${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --env "VITE_GATEWAY_URL=${{ vars.GATEWAY_URL }}" \
            --yes
